<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PediatriPLUS Genetik — WES Yeniden Analiz Hizmeti</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #FAF8F4;
    --surface:      #FFFFFF;
    --surface-2:    #F2EFE9;
    --ink:          #1C1B17;
    --ink-2:        #4A4843;
    --ink-3:        #8B8983;
    --line:         #E5E1D8;
    --accent:       #2D5F4E;
    --accent-bg:    #E3EFE8;
    --warn:         #B45309;
    --warn-bg:      #FBEFD9;
    --danger:       #991B1B;
    --danger-bg:    #FBE5E5;
    --success:      #2D5F4E;
    --success-bg:   #E3EFE8;
    --info:         #1E40AF;
    --info-bg:      #E1E8F5;
    --shadow-sm:    0 1px 2px rgba(28, 27, 23, 0.04);
    --shadow:       0 2px 6px rgba(28, 27, 23, 0.06);
    --radius:       6px;
    --radius-lg:    10px;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body:    'Inter Tight', system-ui, sans-serif;
    --font-mono:    'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--font-body); font-size: 14px; line-height: 1.5; }
  body { min-height: 100vh; }
  .container { max-width: 1100px; margin: 0 auto; padding: 0; min-height: 100vh; background: var(--bg); }

  h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 500; letter-spacing: -0.01em; margin: 0; }
  h2 { font-size: 28px; line-height: 1.15; }
  h3 { font-size: 20px; line-height: 1.2; }
  h4 { font-size: 15px; font-weight: 600; font-family: var(--font-body); letter-spacing: 0.02em; text-transform: uppercase; color: var(--ink-2); }

  code { font-family: var(--font-mono); font-size: 0.85em; background: var(--surface-2); padding: 1px 6px; border-radius: 4px; }

  button {
    font-family: var(--font-body); font-size: 13px; padding: 7px 14px;
    border: 1px solid var(--line); background: var(--surface); color: var(--ink);
    border-radius: var(--radius); cursor: pointer; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  button:hover:not(:disabled) { border-color: var(--ink-3); background: var(--surface-2); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  button.primary:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }
  button.accent { background: var(--accent); color: white; border-color: var(--accent); }
  button.danger { background: var(--surface); color: var(--danger); border-color: var(--danger); }
  button.danger:hover:not(:disabled) { background: var(--danger-bg); }
  button.warn { background: var(--surface); color: var(--warn); border-color: var(--warn); }
  button.warn:hover:not(:disabled) { background: var(--warn-bg); }
  button.success { background: var(--success); color: white; border-color: var(--success); }
  button.ghost { background: transparent; border-color: transparent; color: var(--ink-2); padding: 4px 8px; }
  button.ghost:hover:not(:disabled) { background: var(--surface-2); color: var(--ink); }
  button.icon-btn { padding: 6px 8px; min-width: 0; }

  input, textarea, select {
    font-family: var(--font-body); font-size: 14px;
    border: 1px solid var(--line); padding: 8px 10px;
    background: var(--surface); color: var(--ink);
    border-radius: var(--radius); width: 100%; transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--ink); }
  textarea { resize: vertical; font-family: var(--font-body); line-height: 1.5; }
  input[type="checkbox"] { width: auto; }
  label { font-size: 12px; font-weight: 500; color: var(--ink-2); margin-bottom: 6px; display: block; letter-spacing: 0.01em; }

  .pill {
    display: inline-flex; align-items: center; padding: 3px 10px; gap: 5px;
    border-radius: 100px; font-size: 11px; font-weight: 500; letter-spacing: 0.02em;
  }
  .pill::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pill.payment_pending { background: var(--surface-2); color: var(--ink-3); }
  .pill.paid          { background: var(--info-bg);    color: var(--info); }
  .pill.in_review     { background: var(--warn-bg);    color: var(--warn); }
  .pill.awaiting_info { background: var(--warn-bg);    color: var(--warn); }
  .pill.completed     { background: var(--success-bg); color: var(--success); }
  .pill.cancelled     { background: var(--danger-bg);  color: var(--danger); }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px; border-bottom: 1px solid var(--line);
    background: var(--surface); position: sticky; top: 0; z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 36px; height: 36px; border-radius: 8px; background: var(--ink); color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 19px; font-weight: 500; letter-spacing: -0.02em;
  }
  .brand-text { line-height: 1.1; }
  .brand-name { font-family: var(--font-display); font-size: 19px; font-weight: 500; letter-spacing: -0.02em; }
  .brand-tag { font-size: 11px; color: var(--ink-3); margin-top: 2px; }

  .nav-actions { display: flex; gap: 8px; align-items: center; }

  .content { padding: 32px; }
  .content-narrow { max-width: 800px; margin: 0 auto; }

  .page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
  .page-title-block { flex: 1; }
  .page-eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 4px; }

  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
  .metric {
    background: var(--surface); border: 1px solid var(--line); padding: 18px 20px; border-radius: var(--radius-lg);
  }
  .metric.warn { background: var(--warn-bg); border-color: var(--warn-bg); }
  .metric.warn .metric-label { color: var(--warn); }
  .metric.warn .metric-value { color: var(--warn); }
  .metric-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; font-weight: 500; }
  .metric-value { font-family: var(--font-display); font-size: 36px; font-weight: 400; line-height: 1; letter-spacing: -0.02em; color: var(--ink); }
  .metric-unit { font-size: 14px; color: var(--ink-3); margin-left: 4px; font-family: var(--font-body); }

  .filter-row { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
  .filter-chip {
    padding: 6px 14px; border: 1px solid var(--line); background: var(--surface);
    border-radius: 100px; font-size: 12px; cursor: pointer; color: var(--ink-2);
    transition: all 0.15s; display: inline-flex; gap: 6px; align-items: center;
  }
  .filter-chip:hover { border-color: var(--ink-3); }
  .filter-chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .filter-chip .count { opacity: 0.6; font-family: var(--font-mono); font-size: 11px; }
  .filter-chip.active .count { opacity: 0.8; }

  .case-list { display: flex; flex-direction: column; gap: 8px; }
  .case-row {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg);
    padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
    transition: all 0.15s; cursor: pointer;
  }
  .case-row:hover { border-color: var(--ink-3); box-shadow: var(--shadow); }
  .case-row.warn { border-left: 3px solid var(--warn); padding-left: 17px; }
  .case-meta { display: flex; gap: 10px; align-items: center; font-size: 11px; color: var(--ink-3); margin-top: 6px; flex-wrap: wrap; }
  .case-meta-item { display: flex; gap: 4px; align-items: center; }
  .case-title { font-family: var(--font-display); font-size: 18px; font-weight: 500; letter-spacing: -0.01em; }
  .case-title-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  .empty-state {
    text-align: center; padding: 64px 32px; background: var(--surface);
    border: 1px dashed var(--line); border-radius: var(--radius-lg);
  }
  .empty-state-icon { font-family: var(--font-display); font-size: 48px; color: var(--line); line-height: 1; margin-bottom: 12px; }
  .empty-state-text { color: var(--ink-3); font-size: 14px; }

  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius-lg); padding: 22px 24px; margin-bottom: 14px;
  }
  .card-header {
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 12px; margin-bottom: 14px; border-bottom: 1px solid var(--line);
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); font-weight: 600;
  }
  .card-header::before {
    content: ""; width: 14px; height: 1px; background: var(--ink-3);
  }

  .field { margin-bottom: 16px; }
  .field-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .detail-row { display: flex; padding: 10px 0; border-bottom: 1px solid var(--line); gap: 16px; font-size: 13px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-row.multi { display: block; }
  .detail-label { min-width: 180px; color: var(--ink-3); font-size: 12px; font-weight: 500; }
  .detail-value { flex: 1; white-space: pre-wrap; color: var(--ink); }
  .detail-row.multi .detail-value { margin-top: 4px; }

  .action-bar { display: flex; gap: 8px; flex-wrap: wrap; }
  .action-bar-full { width: 100%; }
  .action-bar-full button { flex: 1; min-width: 0; justify-content: center; padding: 10px; font-weight: 500; }

  .case-detail-header {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg);
    padding: 24px 26px; margin-bottom: 14px;
  }
  .case-detail-title-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; gap: 16px; }
  .case-detail-title { font-family: var(--font-display); font-size: 24px; font-weight: 500; letter-spacing: -0.015em; line-height: 1.2; }
  .case-detail-meta { display: flex; gap: 12px; margin-top: 6px; font-size: 12px; color: var(--ink-3); flex-wrap: wrap; align-items: center; }
  .case-detail-meta-sep { color: var(--line); }

  .nav-arrows { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--ink-3); }
  .nav-arrows .nav-counter { font-family: var(--font-mono); padding: 0 8px; }

  .notice {
    background: var(--warn-bg); color: var(--warn);
    padding: 10px 14px; border-radius: var(--radius); font-size: 12px;
    margin-bottom: 10px; border-left: 3px solid var(--warn);
  }
  .notice-success { background: var(--success-bg); color: var(--success); border-left-color: var(--success); }
  .notice-danger { background: var(--danger-bg); color: var(--danger); border-left-color: var(--danger); }

  .file-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--surface-2); border-radius: var(--radius); font-size: 13px; margin-bottom: 6px;
  }
  .file-row .file-name { font-family: var(--font-mono); font-size: 12px; flex: 1; }
  .file-row .file-meta { font-size: 11px; color: var(--ink-3); padding: 2px 8px; background: var(--surface); border-radius: 4px; }

  .file-picker {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    border: 1px dashed var(--line); border-radius: var(--radius); cursor: pointer;
    background: var(--surface-2); transition: all 0.15s;
  }
  .file-picker:hover { border-color: var(--ink-3); }
  .file-picker.has-file { background: var(--success-bg); border-color: transparent; border-style: solid; }
  .file-picker-icon { font-family: var(--font-display); font-size: 22px; color: var(--ink-3); }
  .file-picker.has-file .file-picker-icon { color: var(--success); }
  .file-picker-main { flex: 1; }
  .file-picker-title { font-size: 13px; font-weight: 500; }
  .file-picker.has-file .file-picker-title { color: var(--success); }
  .file-picker-hint { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .file-picker.has-file .file-picker-hint { color: var(--success); }

  .notes-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .note {
    padding: 12px 14px; background: var(--surface-2);
    border-radius: var(--radius); border-left: 2px solid var(--accent);
  }
  .note-body { font-size: 13px; line-height: 1.55; white-space: pre-wrap; color: var(--ink); }
  .note-foot { font-size: 11px; color: var(--ink-3); margin-top: 6px; font-family: var(--font-mono); }
  .notes-add { display: flex; gap: 8px; align-items: flex-start; }
  .notes-add textarea { flex: 1; min-height: 60px; }

  .timeline { position: relative; padding-left: 26px; }
  .timeline::before {
    content: ""; position: absolute; left: 7px; top: 8px; bottom: 8px;
    width: 1px; background: var(--line);
  }
  .timeline-event { position: relative; padding-bottom: 18px; }
  .timeline-event:last-child { padding-bottom: 0; }
  .timeline-dot {
    position: absolute; left: -23px; top: 2px; width: 14px; height: 14px;
    border-radius: 50%; background: var(--surface); border: 2px solid var(--ink-3);
  }
  .timeline-dot.info { border-color: var(--info); background: var(--info-bg); }
  .timeline-dot.warn { border-color: var(--warn); background: var(--warn-bg); }
  .timeline-dot.success { border-color: var(--success); background: var(--success-bg); }
  .timeline-dot.danger { border-color: var(--danger); background: var(--danger-bg); }
  .timeline-title { font-size: 13px; font-weight: 500; color: var(--ink); }
  .timeline-detail { font-size: 12px; color: var(--ink-2); margin-top: 3px; font-style: italic; }
  .timeline-meta { font-size: 11px; color: var(--ink-3); margin-top: 4px; font-family: var(--font-mono); }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(28, 27, 23, 0.5);
    display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px;
    animation: fadeIn 0.15s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg); padding: 26px 28px;
    max-width: 520px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    max-height: 90vh; overflow-y: auto;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .modal-title { font-family: var(--font-display); font-size: 20px; font-weight: 500; letter-spacing: -0.01em; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .stepper { display: flex; align-items: center; gap: 6px; margin-bottom: 24px; }
  .step-item { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
  .step-bullet {
    width: 26px; height: 26px; border-radius: 50%; background: var(--surface-2);
    color: var(--ink-3); display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; flex-shrink: 0; border: 1px solid var(--line);
    font-family: var(--font-mono);
  }
  .step-bullet.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .step-bullet.done { background: var(--success); color: white; border-color: var(--success); }
  .step-label { font-size: 12px; color: var(--ink-3); }
  .step-label.active { color: var(--ink); font-weight: 500; }
  .step-divider { flex: 1; height: 1px; background: var(--line); min-width: 12px; }

  .price-table { background: var(--surface-2); padding: 16px 20px; border-radius: var(--radius); margin-bottom: 18px; }
  .price-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; }
  .price-row.total {
    font-size: 16px; font-weight: 500; padding: 10px 0 0; margin-top: 8px;
    border-top: 1px solid var(--line); font-family: var(--font-display);
  }

  .success-circle {
    width: 64px; height: 64px; border-radius: 50%; background: var(--success-bg);
    color: var(--success); display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 32px; margin-bottom: 18px;
  }
  .confirm-screen { text-align: center; padding: 24px; }

  .badge-tag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 2px 8px; border-radius: 100px;
    background: var(--info-bg); color: var(--info); font-weight: 500;
  }
  .badge-tag.notes { background: var(--surface-2); color: var(--ink-3); }
  .badge-tag.warn { background: var(--warn-bg); color: var(--warn); }

  hr { border: none; border-top: 1px solid var(--line); margin: 14px 0; }

  @media (max-width: 720px) {
    .content { padding: 20px 16px; }
    .topbar { padding: 14px 16px; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .field-grid-2 { grid-template-columns: 1fr; }
    .case-detail-meta { font-size: 11px; }
  }
</style>
</head>

const calcAge = (dob) => {
  if (!dob) return "-";
  const d = new Date(dob), now = new Date();
  let a = now.getFullYear() - d.getFullYear();
  if (now.getMonth() < d.getMonth() || (now.getMonth() === d.getMonth() && now.getDate() < d.getDate())) a--;
  return a;
};

function TrackCase({ t, cases, onFound, onBack }) {
  const [caseId, setCaseId] = useState("");
  const [email, setEmail] = useState("");
  const [error, setError] = useState(false);

  const submit = () => {
    const cleaned = caseId.trim().toUpperCase();
    const found = cases.find(c =>
      c.id.toUpperCase() === cleaned &&
      c.patient.email.toLowerCase() === email.trim().toLowerCase()
    );
    if (found) { onFound(found.id); setError(false); }
    else setError(true);
  };

  return (
    <div className="content content-narrow" style={{paddingTop:32}}>
      <button className="ghost" onClick={onBack} style={{marginBottom:24}}>{t.trackBack}</button>
      <div className="card" style={{padding:"32px 36px"}}>

          <input value={caseId} onChange={e => setCaseId(e.target.value)} placeholder={t.trackCaseIdPlaceholder}
            style={{fontFamily:"var(--font-mono)"}} autoFocus />
        </Field>
        <Field label={t.trackEmail} required>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)} />
        </Field>
        {error && (
          <div className="notice notice-danger" style={{marginTop:12, marginBottom:12}}>
            {t.trackError}

        )}
        <button className="primary" onClick={submit} disabled={!caseId.trim() || !email.trim()}

        </button>
      </div>
    </div>
  );
}

  const [submittedCaseId, setSubmittedCaseId] = useState(null);
  const [data, setData] = useState({
    consent: { c1: false, c2: false, c3: false },
    patient: { fullName: "", birthDate: "", sex: "", email: "", phone: "", consanguinity: "" },
    clinical: { familyHistory: "", findings: "", previousTests: "", additionalNotes: "" },
    files: { vcfName: "", vcfRef: "GRCh38", reportName: "", prevReportName: "" },
    payment: { cardNumber: "", cardName: "", expiry: "", cvv: "" }
  });
  const update = (section, patch) => setData(d => ({ ...d, [section]: { ...d[section], ...patch } }));

  const canNext = useMemo(() => {
    if (step === 1) return data.consent.c1 && data.consent.c2;
    if (step === 2) return data.patient.fullName && data.patient.email && data.patient.birthDate && data.patient.sex && data.clinical.findings;
    if (step === 3) {
      if (serviceType === "wes_reanalysis") return !!data.files.vcfName;
      if (serviceType === "second_opinion") return !!data.files.reportName;
      if (serviceType === "next_step") return true; // dosya opsiyonel
      return false;
    }
    if (step === 4) return true;
    return false;
  }, [step, data, serviceType]);

  const labels = [t.step1, t.step2, t.step3, t.step4, t.step5];

  return (
    <div className="content content-narrow">
      <button className="ghost" onClick={onCancel} style={{marginBottom:18}}>← {t.backToHome}</button>
      <div className="stepper">
        {labels.map((label, i) => {
          const n = i + 1, active = n === step, done = n < step;
          return (
            <React.Fragment key={n}>
              <div className="step-item">
                <div className={"step-bullet" + (done ? " done" : active ? " active" : "")}>{done ? "✓" : n}</div>
                <div className={"step-label" + (active ? " active" : "")}>{label}</div>
              </div>
              {n < labels.length && <div className="step-divider"></div>}
            </React.Fragment>
          );
        })}
      </div>

      <div className="card" style={{padding:"28px 32px"}}>
        {step === 1 && (
          <div>
            <h3 style={{marginBottom:14}}>{t.consentTitle}</h3>
            <div style={{background:"var(--surface-2)", padding:"16px 20px", borderRadius:"var(--radius)", fontSize:13, lineHeight:1.7, color:"var(--ink-2)", marginBottom:20}}>{t.consentBody}</div>
            {[["c1", t.consent1, true], ["c2", t.consent2, true], ["c3", t.consent3, false]].map(([k, lbl, req]) => (
              <label key={k} style={{display:"flex", gap:12, alignItems:"flex-start", marginBottom:14, cursor:"pointer", fontSize:13, lineHeight:1.5}}>
                <input type="checkbox" checked={data.consent[k]} onChange={e => update("consent", { [k]: e.target.checked })} style={{marginTop:3, flexShrink:0}} />
                <span>{lbl} {req && <span style={{color:"var(--danger)"}}>*</span>}</span>
              </label>
            ))}
          </div>
        )}
        {step === 2 && (
          <div>
            <h3 style={{marginBottom:18}}>{t.patientInfo}</h3>
            <div className="field-grid-2">
              <Field label={t.fullName} required><input value={data.patient.fullName} onChange={e => update("patient", { fullName: e.target.value })} /></Field>
              <Field label={t.email} required><input type="email" value={data.patient.email} onChange={e => update("patient", { email: e.target.value })} /></Field>
              <Field label={t.birthDate} required><input type="date" value={data.patient.birthDate} onChange={e => update("patient", { birthDate: e.target.value })} /></Field>
              <Field label={t.sex} required>
                <select value={data.patient.sex} onChange={e => update("patient", { sex: e.target.value })}>
                  <option value="">— {t.pickOption} —</option>
                  <option value="M">{t.sexM}</option>
                  <option value="F">{t.sexF}</option>
                  <option value="O">{t.sexO}</option>
                </select>
              </Field>
              <Field label={t.phone}><input value={data.patient.phone} onChange={e => update("patient", { phone: e.target.value })} /></Field>
              <Field label={t.consanguinity}>
                <select value={data.patient.consanguinity} onChange={e => update("patient", { consanguinity: e.target.value })}>
                  <option value="">— {t.pickOption} —</option>
                  <option value="yes">{t.yes}</option>
                  <option value="no">{t.no}</option>
                  <option value="unknown">{t.unknown}</option>
                </select>
              </Field>
            </div>
            <Field label={t.familyHistory}><textarea value={data.clinical.familyHistory} onChange={e => update("clinical", { familyHistory: e.target.value })} style={{minHeight:70}} /></Field>
            <Field label={t.clinicalFindings} required>
              <textarea placeholder={t.clinicalPlaceholder} value={data.clinical.findings} onChange={e => update("clinical", { findings: e.target.value })} style={{minHeight:100}} />
            </Field>
            <Field label={t.previousTests}>
              <textarea placeholder={t.previousTestsPlaceholder} value={data.clinical.previousTests} onChange={e => update("clinical", { previousTests: e.target.value })} style={{minHeight:80}} />
            </Field>
          </div>
        )}
        {step === 3 && (
          <div>
            {serviceType === "wes_reanalysis" && (
              <>
                <h3 style={{marginBottom:8}}>{t.wesFilesTitle}</h3>
                <p style={{fontSize:13, color:"var(--ink-2)", marginTop:0, marginBottom:18, lineHeight:1.6}}>{t.wesFilesDesc}</p>
                <FilePicker t={t} label={t.vcfFile} required accept=".vcf,.gz" hint={t.vcfHint}
                  value={data.files.vcfName} onChange={(n) => update("files", { vcfName: n })} />
                <Field label={t.vcfReference}>
                  <select value={data.files.vcfRef} onChange={e => update("files", { vcfRef: e.target.value })}>
                    <option value="GRCh38">GRCh38 / hg38</option>
                    <option value="GRCh37">GRCh37 / hg19</option>
                  </select>
                </Field>
                <FilePicker t={t} label={t.previousTests + " " + t.optionalLabel} accept=".pdf,.jpg,.png"
                  hint={t.geneticReportHint}
                  value={data.files.prevReportName} onChange={(n) => update("files", { prevReportName: n })} />
              </>
            )}
            {serviceType === "second_opinion" && (
              <>
                <h3 style={{marginBottom:8}}>{t.secondOpinionFilesTitle}</h3>
                <p style={{fontSize:13, color:"var(--ink-2)", marginTop:0, marginBottom:18, lineHeight:1.6}}>{t.secondOpinionFilesDesc}</p>
                <FilePicker t={t} label={t.geneticReport} required accept=".pdf,.jpg,.png" hint={t.geneticReportHint}
                  value={data.files.reportName} onChange={(n) => update("files", { reportName: n })} />
                <Field label={t.additionalNotes}>
                  <textarea value={data.clinical.additionalNotes}
                    onChange={e => update("clinical", { additionalNotes: e.target.value })}
                    placeholder={t.additionalNotesPlaceholder} style={{minHeight:80}} />
                </Field>
              </>
            )}
            {serviceType === "next_step" && (
              <>
                <h3 style={{marginBottom:8}}>{t.nextStepFilesTitle}</h3>
                <p style={{fontSize:13, color:"var(--ink-2)", marginTop:0, marginBottom:18, lineHeight:1.6}}>{t.nextStepFilesDesc}</p>
                <FilePicker t={t} label={t.geneticReport + " " + t.optionalLabel} accept=".pdf,.jpg,.png"
                  hint={t.geneticReportHint}
                  value={data.files.reportName} onChange={(n) => update("files", { reportName: n })} />
                <Field label={t.additionalNotes}>
                  <textarea value={data.clinical.additionalNotes}
                    onChange={e => update("clinical", { additionalNotes: e.target.value })}
                    placeholder={t.additionalNotesPlaceholder} style={{minHeight:80}} />
                </Field>
              </>
            )}
          </div>
        )}
        {step === 4 && (() => {
          const fee = sys.standardFee, vat = Math.round(fee * sys.vatRate / 100), total = fee + vat;
          return (
            <div>
              <h3 style={{marginBottom:8}}>{t.paymentRedirectTitle}</h3>
              <p style={{fontSize:13, color:"var(--ink-2)", marginTop:0, marginBottom:18, lineHeight:1.6}}>{t.paymentRedirectIntro}</p>

              <div style={{background:"var(--surface-2)", padding:"14px 18px", borderRadius:"var(--radius)", marginBottom:14, fontSize:13}}>
                <div style={{display:"flex", justifyContent:"space-between", padding:"4px 0", color:"var(--ink-2)"}}>
                  <span>{t.serviceLabel}</span>
                  <span style={{fontWeight:500, color:"#690f56"}}>
                    {serviceType === "wes_reanalysis" && t.serviceTypeWes}
                    {serviceType === "second_opinion" && t.serviceTypeSecondOpinion}
                    {serviceType === "next_step" && t.serviceTypeNextStep}
                  </span>
                </div>
                <div style={{display:"flex", justifyContent:"space-between", padding:"4px 0", color:"var(--ink-2)"}}>
                  <span>{t.fullName}</span>
                  <span style={{fontWeight:500, color:"var(--ink)"}}>{data.patient.fullName || "—"}</span>
                </div>
                <div style={{display:"flex", justifyContent:"space-between", padding:"4px 0", color:"var(--ink-2)"}}>
                  <span>{t.email}</span>
                  <span style={{fontWeight:500, color:"var(--ink)", fontFamily:"var(--font-mono)", fontSize:12}}>{data.patient.email || "—"}</span>
                </div>
              </div>

              <div className="price-table">
                <div className="price-row"><span>{t.serviceFee}</span><span>{fee.toLocaleString()} ₺</span></div>
                <div className="price-row"><span>{t.vat.replace("20", sys.vatRate)}</span><span>{vat.toLocaleString()} ₺</span></div>
                <div className="price-row total"><span>{t.total}</span><span>{total.toLocaleString()} ₺</span></div>
              </div>

              <div style={{padding:"12px 14px", background:"var(--brand-bg, var(--accent-bg))", borderRadius:"var(--radius)", marginTop:14,
                fontSize:12, color:"var(--ink-2)", lineHeight:1.6,
                display:"flex", gap:10, alignItems:"flex-start"}}>
                <span style={{fontSize:16, lineHeight:1}}>🔒</span>
                <span>{t.paymentSecureNote}</span>
              </div>
            </div>
          );
        })()}
        {step === 5 && (
          <div className="confirm-screen">
            <div style={{width:64, height:64, borderRadius:"50%", background:"var(--surface-2)",
              color:"var(--ink-2)", display:"inline-flex", alignItems:"center", justifyContent:"center",
              fontSize:30, marginBottom:18}}>💳</div>
            <h3 style={{marginBottom:10}}>{t.paymentPendingTitle}</h3>
            <p style={{fontSize:14, color:"var(--ink-2)", lineHeight:1.7, maxWidth:480, margin:"0 auto 20px"}}>{t.paymentPendingBody}</p>
            {submittedCaseId && (
              <div style={{background:"var(--surface-2)", padding:"16px 20px", borderRadius:"var(--radius)", marginBottom:20, display:"inline-block"}}>
                <div style={{fontSize:11, color:"var(--ink-3)", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:6}}>{t.yourCaseId}</div>
                <div style={{fontFamily:"var(--font-mono)", fontSize:18, fontWeight:500}}>{submittedCaseId}</div>
                <div style={{fontSize:11, color:"var(--ink-3)", marginTop:8, maxWidth:320, lineHeight:1.4}}>{t.saveCaseId}</div>
              </div>
            )}
            <div style={{display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap"}}>
              <a href={IYZICO_PAYMENT_URL + "?ref=" + encodeURIComponent(submittedCaseId || "")}
                target="_blank" rel="noopener noreferrer"
                style={{textDecoration:"none"}}>
                <button className="primary" style={{padding:"10px 18px"}}>
                  🔒 {t.proceedToPayment} →
                </button>
              </a>
              <button onClick={() => onComplete("paid", submittedCaseId)}>
                ✓ {t.paymentReturn}
              </button>
            </div>
            <div style={{marginTop:24}}>
              <button className="ghost" onClick={() => onComplete("home")}>{t.backToHome}</button>
            </div>
          </div>
        )}
      </div>

      {step === 4 && (
        <div style={{marginTop:14, fontSize:12, color:"var(--ink-3)", textAlign:"center"}}>
          {/* hint about the redirect, optional */}
        </div>
      )}

      {step < 5 && (
        <div style={{display:"flex", justifyContent:"space-between", marginTop:18}}>
          <button onClick={() => setStep(s => Math.max(1, s - 1))} disabled={step === 1}>← {t.back}</button>
          <button className="primary" onClick={async () => {
            if (step === 4) {
              const now = new Date().toISOString();
              const fee = sys.standardFee;
              const vatAmount = Math.round(fee * sys.vatRate / 100);
              const totalAmount = fee + vatAmount;
              const newCase = {
                id: newId(), createdAt: now, status: "payment_pending",
                serviceType: serviceType || "wes_reanalysis",
                patient: data.patient, clinical: data.clinical, files: data.files,
                payment: { amount: totalAmount, currency: "TRY" },
                payments: [],
                reportFileName: null, reportSummary: "", assignee: null, notes: [],
                events: [{ id: newEventId(), type: "case_created", actorName: "System",
                  timestamp: now, detail: { amount: totalAmount, serviceType: serviceType || "wes_reanalysis" } }]
              };

              // 1) Lokal kayıt
              onComplete("submit", newCase);
              setSubmittedCaseId(newCase.id);

              // 2) Formspree'ye gönder (e-mail tahiratik@yahoo.com'a düşer)
              const serviceLabel = serviceType === "second_opinion" ? "İkincil Görüş"
                : serviceType === "next_step" ? "Sıradaki Test Danışmanlığı"
                : "WES Reanaliz";
              const formData = {
                _subject: `[PediatriPLUS] Yeni vaka: ${newCase.id} — ${serviceLabel}`,
                _replyto: data.patient.email,
                "Vaka Numarası": newCase.id,
                "Hizmet Türü": serviceLabel,
                "Hasta Adı": data.patient.fullName,
                "Doğum Tarihi": data.patient.birthDate,
                "Cinsiyet": data.patient.sex === "M" ? "Erkek" : data.patient.sex === "F" ? "Kadın" : "Diğer",
                "E-posta": data.patient.email,
                "Telefon": data.patient.phone || "—",
                "Akraba Evliliği": data.patient.consanguinity === "yes" ? "Evet" : data.patient.consanguinity === "no" ? "Hayır" : "Bilinmiyor",
                "Aile Öyküsü": data.clinical.familyHistory || "—",
                "Klinik Bulgular": data.clinical.findings,
                "Önceki Testler": data.clinical.previousTests || "—",
                "Ek Notlar": data.clinical.additionalNotes || "—",
                "VCF Dosyası": data.files.vcfName || "—",
                "Referans Genom": data.files.vcfRef || "—",
                "Genetik Rapor": data.files.reportName || "—",
                "Önceki Rapor": data.files.prevReportName || "—",
                "Tutar": totalAmount.toLocaleString() + " ₺ (KDV dahil)",
                "Talep Zamanı": new Date().toLocaleString("tr-TR"),
                "Durum": "Ödeme bekleniyor",
                "Iyzico Linki": IYZICO_PAYMENT_URL + "?ref=" + newCase.id,
                "_note": "Hastadan VCF/PDF dosyasını e-mail ile beklemeyi unutmayın. Ödeme tamamlandığında Iyzico ayrı bildirim gönderecek."
              };
              try {
                fetch(FORMSPREE_URL, {
                  method: "POST",
                  headers: { "Content-Type": "application/json", "Accept": "application/json" },
                  body: JSON.stringify(formData)
                }).catch(err => console.error("Formspree gönderim hatası:", err));
              } catch (e) { console.error("Formspree:", e); }

              // 3) Iyzico ödeme sayfasını yeni sekmede aç
              window.open(IYZICO_PAYMENT_URL + "?ref=" + encodeURIComponent(newCase.id), "_blank", "noopener,noreferrer");
              setStep(5);
            } else { setStep(s => s + 1); }
          }} disabled={!canNext}>
            {step === 4 ? t.proceedToPayment + " →" : t.next + " →"}
          </button>
        </div>
      )}
    </div>
  );
}

function DetailRow({ label, value, multiline }) {
  return (
    <div className={"detail-row" + (multiline ? " multi" : "")}>
      <div className="detail-label">{label}</div>
      <div className="detail-value">{value || "—"}</div>
    </div>
  );
}

function PatientCaseDetail({ caseData, t, onBack }) {
  const c = caseData;
  const isPaymentPending = c.status === "payment_pending";
  return (
    <div className="content content-narrow">
      <button className="ghost" onClick={onBack} style={{marginBottom:18}}>← {t.backToHome}</button>
      {isPaymentPending && (
        <div className="card" style={{padding:"18px 22px", marginBottom:14,
          background:"var(--warn-bg)", borderColor:"var(--warn-bg)"}}>
          <div style={{display:"flex", gap:12, alignItems:"flex-start"}}>
            <div style={{fontSize:24, lineHeight:1}}>💳</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:600, color:"var(--warn)", marginBottom:4, fontSize:14}}>{t.paymentPendingTitle}</div>
              <div style={{fontSize:12, color:"var(--warn)", lineHeight:1.6, marginBottom:10}}>{t.paymentPendingBody}</div>
              <a href={IYZICO_PAYMENT_URL + "?ref=" + encodeURIComponent(c.id)}
                target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}>
                <button className="primary" style={{fontSize:12}}>🔒 {t.proceedToPayment} →</button>
              </a>
            </div>
          </div>
        </div>
      )}
      <div className="card">
        <div className="case-detail-title-row">
          <div>
            <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:6, flexWrap:"wrap"}}>
              <div className="case-detail-title">{c.patient.fullName}</div>
              <ServiceBadge serviceType={c.serviceType} t={t} />
            </div>
            <div className="case-detail-meta">
              <code>{c.id}</code>
              <span className="case-detail-meta-sep">·</span>
              <span>{fmtDateTime(c.createdAt)}</span>
            </div>
          </div>
          <Pill status={c.status} t={t} />
        </div>
        <DetailRow label={t.email} value={c.patient.email} />
        <DetailRow label={t.birthDate} value={c.patient.birthDate ? `${fmtDate(c.patient.birthDate)} (${calcAge(c.patient.birthDate)} ${t.age})` : "-"} />
        <DetailRow label={t.clinicalFindings} value={c.clinical.findings} multiline />
        {c.files?.vcfName && (
          <DetailRow label={t.vcfFile} value={`${c.files.vcfName} (${c.files.vcfRef})`} />
        )}
        {c.files?.reportName && (
          <DetailRow label={t.geneticReport} value={c.files.reportName} />
        )}
        {c.status === "completed" && c.reportFileName && (
          <div style={{marginTop:20, padding:"14px 16px", background:"var(--success-bg)", borderRadius:"var(--radius)", display:"flex", alignItems:"center", gap:12}}>
            <div style={{fontSize:20}}>📄</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13, fontWeight:500, color:"var(--success)"}}>{c.reportFileName}</div>
              <div style={{fontSize:11, color:"var(--success)", marginTop:2}}>{t.emailSent}</div>
            </div>
            <button className="accent" onClick={() => alert("⬇ " + c.reportFileName)}>↓ {t.downloadReport}</button>
          </div>
        )}
      </div>
    </div>
  );
}

function AdminQueue({ cases, t, onView }) {
  const [filter, setFilter] = useState("paid");
  const counts = {
    payment_pending: cases.filter(c => c.status === "payment_pending").length,
    paid: cases.filter(c => c.status === "paid").length,
    in_review: cases.filter(c => c.status === "in_review").length,
    awaiting_info: cases.filter(c => c.status === "awaiting_info").length,
    completed: cases.filter(c => c.status === "completed").length
  };
  const slaRisk = cases.filter(c => c.status === "paid" && hoursSince(c.createdAt) > 48).length;
  const today = new Date().toDateString();
  const doneToday = cases.filter(c => c.status === "completed" && c.completedAt && new Date(c.completedAt).toDateString() === today).length;
  const completedDurations = cases.filter(c => c.status === "completed" && c.completedAt).map(c => (new Date(c.completedAt) - new Date(c.createdAt)) / 36e5);
  const avgHours = completedDurations.length > 0 ? Math.round(completedDurations.reduce((a, b) => a + b) / completedDurations.length) : 0;
  const avgDays = avgHours > 0 ? Math.round(avgHours / 24 * 10) / 10 : 0;

  const filtered = cases.filter(c => c.status === filter);

  return (
    <div className="content">
      <div className="page-header">
        <div className="page-title-block">
          <div className="page-eyebrow">{t.adminEyebrow}</div>
          <h2>{t.adminQueue}</h2>
        </div>
      </div>

      <div className="metrics">
        <div className="metric">
          <div className="metric-label">{t.mPending}</div>
          <div className="metric-value">{counts.paid}</div>
        </div>
        <div className="metric">
          <div className="metric-label">{t.mAvg}</div>
          <div className="metric-value">{avgDays > 0 ? avgDays : t.none}{avgDays > 0 && <span className="metric-unit">{t.days}</span>}</div>
        </div>
        <div className={"metric" + (slaRisk > 0 ? " warn" : "")}>
          <div className="metric-label">{t.mSla}</div>
          <div className="metric-value">{slaRisk}</div>
        </div>
        <div className="metric">
          <div className="metric-label">{t.mToday}</div>
          <div className="metric-value">{doneToday}</div>
        </div>
      </div>

      <div className="filter-row">
        <div className={"filter-chip" + (filter === "payment_pending" ? " active" : "")} onClick={() => setFilter("payment_pending")}>
          {t.paymentPendingStatus} <span className="count">{counts.payment_pending}</span>
        </div>
        <div className={"filter-chip" + (filter === "paid" ? " active" : "")} onClick={() => setFilter("paid")}>
          {t.pending} <span className="count">{counts.paid}</span>
        </div>
        <div className={"filter-chip" + (filter === "in_review" ? " active" : "")} onClick={() => setFilter("in_review")}>
          {t.inProgress} <span className="count">{counts.in_review}</span>
        </div>
        <div className={"filter-chip" + (filter === "awaiting_info" ? " active" : "")} onClick={() => setFilter("awaiting_info")}>
          {t.awaitingInfo} <span className="count">{counts.awaiting_info}</span>
        </div>
        <div className={"filter-chip" + (filter === "completed" ? " active" : "")} onClick={() => setFilter("completed")}>
          {t.completedFilter} <span className="count">{counts.completed}</span>
        </div>
      </div>

      {filtered.length === 0 ? (
        <div className="empty-state">
          <div className="empty-state-icon">∅</div>
          <div className="empty-state-text">{t.noResults}</div>
        </div>
      ) : (
        <div className="case-list">
          {filtered.map((c, i) => {
            const hrs = hoursSince(c.createdAt);
            const slaWarn = c.status === "paid" && hrs > 48;
            return (
              <div key={c.id} className={"case-row" + (slaWarn ? " warn" : "")} onClick={() => onView(c.id, filtered.map(f => f.id), i)}>
                <div style={{flex: 1, minWidth: 0}}>
                  <div className="case-title-row">
                    <span className="case-title">{c.patient.fullName}</span>
                    <Pill status={c.status} t={t} />
                    <ServiceBadge serviceType={c.serviceType} t={t} />
                    {slaWarn && <span className="badge-tag warn">⚠ {t.sla48}</span>}
                    {c.assignee && <span className="badge-tag">{c.assignee === CURRENT_USER ? t.you : t.drYilmaz}</span>}
                    {c.notes && c.notes.length > 0 && <span className="badge-tag notes">📝 {c.notes.length}</span>}
                  </div>
                  <div className="case-meta">
                    <code>{c.id}</code>
                    <span className="case-detail-meta-sep">·</span>
                    <span>{hrs >= 24 ? Math.floor(hrs/24) + " " + t.days : hrs + " " + t.hrs}</span>
                    {(c.files?.vcfName || c.files?.reportName) && (
                      <>
                        <span className="case-detail-meta-sep">·</span>
                        <span style={{fontFamily:"var(--font-mono)"}}>{c.files.vcfName || c.files.reportName}</span>
                      </>
                    )}
                  </div>
                </div>
                <button>{t.viewDetails} →</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function PaymentSummary({ c, t }) {
  const txns = c.payments && c.payments.length > 0
    ? c.payments
    : [{ id: "init", type: "initial", amount: c.payment?.amount || 9000, timestamp: c.createdAt }];

  const totalIn = txns.filter(p => p.type !== "refund").reduce((s, p) => s + p.amount, 0);
  const totalOut = txns.filter(p => p.type === "refund").reduce((s, p) => s + p.amount, 0);
  const net = totalIn - totalOut;

  const typeLabel = (type) => {
    if (type === "initial") return t.paymentTypeInitial;
    if (type === "refund") return t.paymentTypeRefund;
    if (type === "extra") return t.paymentTypeExtra;
    return type;
  };
  const typeColor = (type) => {
    if (type === "refund") return "var(--danger)";
    if (type === "extra") return "var(--warn)";
    return "var(--success)";
  };
  const typeSign = (type) => type === "refund" ? "−" : "+";

  return (
    <div>
      <div style={{display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:12, marginBottom:16}}>
        <div style={{background:"var(--surface-2)", padding:"12px 14px", borderRadius:"var(--radius)"}}>
          <div style={{fontSize:11, color:"var(--ink-3)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:4}}>{t.paidAmount}</div>
          <div style={{fontFamily:"var(--font-display)", fontSize:22, fontWeight:500}}>{totalIn.toLocaleString()} ₺</div>
        </div>
        <div style={{background:"var(--surface-2)", padding:"12px 14px", borderRadius:"var(--radius)"}}>
          <div style={{fontSize:11, color:"var(--ink-3)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:4}}>{t.netRefunded}</div>
          <div style={{fontFamily:"var(--font-display)", fontSize:22, fontWeight:500, color: totalOut > 0 ? "var(--danger)" : "var(--ink-3)"}}>{totalOut.toLocaleString()} ₺</div>
        </div>
        <div style={{background:"var(--accent-bg)", padding:"12px 14px", borderRadius:"var(--radius)"}}>
          <div style={{fontSize:11, color:"var(--success)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:4}}>{t.netPaid}</div>
          <div style={{fontFamily:"var(--font-display)", fontSize:22, fontWeight:500, color:"var(--success)"}}>{net.toLocaleString()} ₺</div>
        </div>
      </div>

      <div style={{fontSize:11, color:"var(--ink-3)", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:8, fontWeight:600}}>{t.paymentHistory}</div>
      <div style={{display:"flex", flexDirection:"column", gap:6}}>
        {txns.map(p => (
          <div key={p.id} style={{display:"flex", alignItems:"center", gap:12, padding:"10px 12px", background:"var(--surface-2)", borderRadius:"var(--radius)"}}>
            <div style={{fontSize:11, color:"var(--ink-3)", minWidth:120}}>{fmtDateTime(p.timestamp)}</div>
            <div style={{fontSize:12, fontWeight:500, minWidth:100}}>{typeLabel(p.type)}</div>
            <div style={{flex:1, fontSize:11, color:"var(--ink-2)", fontStyle: p.reason ? "italic" : "normal"}}>{p.reason || "—"}</div>
            <div style={{fontFamily:"var(--font-mono)", fontSize:13, fontWeight:500, color: typeColor(p.type)}}>
              {typeSign(p.type)}{p.amount.toLocaleString()} ₺
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Timeline({ events, t }) {
  const labelMap = {
    case_created: { color: "", label: t.caseCreated },
    paid: { color: "info", label: t.timelinePaid },
    assigned: { color: "info", label: t.timelineAssigned },
    note: { color: "", label: t.timelineNote },
    hold: { color: "warn", label: t.timelineHold },
    resume: { color: "info", label: t.timelineResume },
    report_uploaded: { color: "info", label: t.timelineReportUploaded },
    delivered: { color: "success", label: t.timelineDelivered },
    reassigned: { color: "warn", label: t.timelineReassigned },
    cancelled: { color: "danger", label: t.timelineCancelled },
    refund: { color: "danger", label: t.timelineRefund },
    extra: { color: "warn", label: t.timelineExtra }
  };
  if (!events || events.length === 0) return <p style={{fontSize:12, color:"var(--ink-3)", fontStyle:"italic", margin:"4px 0"}}>—</p>;
  const sorted = [...events].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  return (
    <div className="timeline">
      {sorted.map(e => {
        const meta = labelMap[e.type] || { color: "", label: e.type };
        return (
          <div key={e.id} className="timeline-event">
            <div className={"timeline-dot " + meta.color}></div>
            <div className="timeline-title">{meta.label}</div>
            {e.detail && e.detail.message && <div className="timeline-detail">"{e.detail.message}"</div>}
            {e.detail && e.detail.preview && <div className="timeline-detail">"{e.detail.preview}..."</div>}
            {e.detail && e.detail.reason && <div className="timeline-detail">{e.detail.reason}</div>}
            {e.detail && e.detail.reportName && <div className="timeline-detail" style={{fontFamily:"var(--font-mono)", fontStyle:"normal"}}>{e.detail.reportName}</div>}
            {e.detail && typeof e.detail.amount === "number" && (
              <div className="timeline-detail" style={{fontStyle:"normal", fontFamily:"var(--font-mono)", color:"var(--ink-2)"}}>
                {e.type === "refund" ? "−" : "+"}{e.detail.amount.toLocaleString()} ₺
              </div>
            )}
            <div className="timeline-meta">{e.actorName} · {fmtDateTime(e.timestamp)}</div>
          </div>
        );
      })}
    </div>
  );
}

function Modal({ title, onClose, children }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">{title}</div>
          <button className="ghost icon-btn" onClick={onClose} aria-label="Close">✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function AdminCaseDetail({ caseData, t, onBack, onUpdate, queueIds, queueIdx, onNavigate }) {
  const c = caseData;
  const [activeModal, setActiveModal] = useState(null);
  const [noteText, setNoteText] = useState("");
  const [holdMsg, setHoldMsg] = useState("");
  const [cancelReason, setCancelReason] = useState("");
  const [reassignAdmin, setReassignAdmin] = useState("dr_yilmaz");
  const [reassignReason, setReassignReason] = useState("");
  const [reportFile, setReportFile] = useState("");
  const [reportSummary, setReportSummary] = useState("");
  const [refundType, setRefundType] = useState("partial");
  const [refundAmount, setRefundAmount] = useState("");
  const [refundReason, setRefundReason] = useState("");
  const [extraAmount, setExtraAmount] = useState("");
  const [extraReason, setExtraReason] = useState("");
  const [cancelWithRefund, setCancelWithRefund] = useState(true);

  const addEvent = (type, detail) => ({
    id: newEventId(), type, actorName: t.drAtik, timestamp: new Date().toISOString(), detail: detail || null
  });

  const takeCase = () => {
    onUpdate({ ...c, status: "in_review", assignee: CURRENT_USER, takenAt: new Date().toISOString(),
      events: [...(c.events || []), addEvent("assigned", null)] });
  };

  const confirmPayment = () => {
    const amt = c.payment?.amount || 0;
    onUpdate({ ...c, status: "paid",
      payments: [...(c.payments || []), {
        id: newEventId(), type: "initial", amount: amt,
        reason: "Manuel onay (Iyzico)", timestamp: new Date().toISOString()
      }],
      events: [...(c.events || []), addEvent("paid", { amount: amt })] });
  };

  const doReassign = () => {
    onUpdate({ ...c, assignee: reassignAdmin,
      events: [...(c.events || []), addEvent("reassigned", { reason: reassignReason })] });
    setActiveModal(null); setReassignReason("");
  };

  const doRequestInfo = () => {
    onUpdate({ ...c, status: "awaiting_info", awaitingMessage: holdMsg,
      events: [...(c.events || []), addEvent("hold", { message: holdMsg })] });
    setTimeout(() => alert("📧 E-mail → " + c.patient.email + "\n\n\"" + holdMsg + "\""), 200);
    setActiveModal(null); setHoldMsg("");
  };

  const resumeReview = () => {
    onUpdate({ ...c, status: "in_review", awaitingMessage: null,
      events: [...(c.events || []), addEvent("resume", null)] });
  };

  const doCancel = () => {
    const updates = {
      ...c, status: "cancelled", cancelReason,
      events: [...(c.events || []), addEvent("cancelled", { reason: cancelReason })]
    };
    if (cancelWithRefund) {
      const totalPaid = (c.payments || [{ type: "initial", amount: c.payment?.amount || 9000 }])
        .reduce((sum, p) => p.type === "refund" ? sum - p.amount : sum + p.amount, 0);
      const refundTxn = {
        id: newEventId(), type: "refund",
        amount: totalPaid,
        reason: cancelReason || "Vaka iptali — tam iade",
        timestamp: new Date().toISOString()
      };
      updates.payments = [...(c.payments || []), refundTxn];
      updates.events = [...updates.events, addEvent("refund", { amount: totalPaid, reason: "İptal — tam iade" })];
    }
    onUpdate(updates);
    setActiveModal(null); setCancelReason(""); setCancelWithRefund(true);
  };

  const doRefund = () => {
    const amount = parseFloat(refundAmount);
    if (isNaN(amount) || amount <= 0) { alert(t.refundAmountInvalid); return; }
    const refundTxn = {
      id: newEventId(), type: "refund", amount,
      reason: refundReason, timestamp: new Date().toISOString()
    };
    onUpdate({ ...c,
      payments: [...(c.payments || []), refundTxn],
      events: [...(c.events || []), addEvent("refund", { amount, reason: refundReason })]
    });
    setTimeout(() => alert("💳 İade Iyzico'ya gönderildi: " + amount.toLocaleString() + " ₺"), 200);
    setActiveModal(null); setRefundAmount(""); setRefundReason(""); setRefundType("partial");
  };

  const doExtraCharge = () => {
    const amount = parseFloat(extraAmount);
    if (isNaN(amount) || amount <= 0) { alert(t.refundAmountInvalid); return; }
    const chargeTxn = {
      id: newEventId(), type: "extra", amount,
      reason: extraReason, timestamp: new Date().toISOString()
    };
    onUpdate({ ...c,
      payments: [...(c.payments || []), chargeTxn],
      events: [...(c.events || []), addEvent("extra", { amount, reason: extraReason })]
    });
    setTimeout(() => alert("💳 Ek ücret talebi gönderildi: " + amount.toLocaleString() + " ₺ → " + c.patient.email), 200);
    setActiveModal(null); setExtraAmount(""); setExtraReason("");
  };

  const doComplete = () => {
    onUpdate({ ...c, status: "completed", reportFileName: reportFile, reportSummary,
      completedAt: new Date().toISOString(),
      events: [...(c.events || []),
        addEvent("report_uploaded", { reportName: reportFile }),
        addEvent("delivered", null)] });
    setTimeout(() => alert("📧 " + t.emailSent + "\n→ " + c.patient.email), 200);
    setActiveModal(null); setReportFile(""); setReportSummary("");
  };

  const addNote = () => {
    if (!noteText.trim()) return;
    onUpdate({ ...c,
      notes: [...(c.notes || []), { id: newEventId(), text: noteText.trim(), authorName: t.drAtik, timestamp: new Date().toISOString() }],
      events: [...(c.events || []), addEvent("note", { preview: noteText.slice(0, 60) })] });
    setNoteText("");
  };

  const hrsWaiting = hoursSince(c.createdAt);

  let actionBar = null;
  if (c.status === "payment_pending") {
    actionBar = (
      <div>
        <div className="notice" style={{marginBottom:10}}>
          💳 {t.paymentPendingAdminNote}
        </div>

          <button className="primary" onClick={confirmPayment}>✓ {t.actConfirmPayment}</button>
          <button className="danger" onClick={() => setActiveModal("cancel")}>✕ {t.actCancel}</button>
        </div>
      </div>
    );
  } else if (c.status === "paid") {
    actionBar = (
      <div className="action-bar action-bar-full">
        <button className="primary" onClick={takeCase}>📋 {t.actAssign}</button>
      </div>
    );
  } else if (c.status === "in_review") {
    actionBar = (
      <div className="action-bar">
        <button className="success" onClick={() => setActiveModal("complete")}>✓ {t.actComplete}</button>
        <button className="warn" onClick={() => setActiveModal("hold")}>? {t.actHold}</button>
        <button onClick={() => setActiveModal("reassign")}>→ {t.actReassign}</button>
        <button onClick={() => setActiveModal("refund")}>↩ {t.actRefund}</button>
        <button onClick={() => setActiveModal("extra")}>+ {t.actExtraCharge}</button>
        <button className="danger" onClick={() => setActiveModal("cancel")}>✕ {t.actCancel}</button>
      </div>
    );
  } else if (c.status === "awaiting_info") {
    actionBar = (
      <div>
        {c.awaitingMessage && <div className="notice">{t.awaitingMessage}: {c.awaitingMessage}</div>}
        <div className="action-bar">
          <button className="primary" onClick={resumeReview}>▶ {t.actResume}</button>
          <button className="danger" onClick={() => setActiveModal("cancel")}>✕ {t.actCancel}</button>
        </div>
      </div>
    );
  } else if (c.status === "completed") {
    actionBar = (
      <div>
        <div className="notice notice-success" style={{marginBottom:10}}>
          ✉ {t.emailSent} → {c.patient.email}
        </div>
        <div className="action-bar">
          <button onClick={() => setActiveModal("refund")}>↩ {t.actRefund}</button>
        </div>
      </div>
    );
  } else if (c.status === "cancelled") {
    actionBar = (
      <div className="notice notice-danger">
        ✕ {c.cancelReason || "Cancelled"}
      </div>
    );
  }

  return (
    <div className="content">
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18}}>
        <button className="ghost" onClick={onBack}>← {t.backToQueue}</button>
        {queueIds && queueIds.length > 1 && (
          <div className="nav-arrows">
            <button className="ghost icon-btn" onClick={() => onNavigate(-1)} disabled={queueIdx === 0}>◀</button>
            <span className="nav-counter">{queueIdx + 1} {t.pageOf} {queueIds.length}</span>
            <button className="ghost icon-btn" onClick={() => onNavigate(1)} disabled={queueIdx === queueIds.length - 1}>▶</button>
          </div>
        )}
      </div>

      <div className="case-detail-header">
        <div className="case-detail-title-row">
          <div style={{flex:1}}>
            <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:6, flexWrap:"wrap"}}>
              <div className="case-detail-title">{c.patient.fullName}</div>
              <ServiceBadge serviceType={c.serviceType} t={t} />
            </div>
            <div className="case-detail-meta">
              <code>{c.id}</code>
              <span className="case-detail-meta-sep">·</span>
              <span>{fmtDateTime(c.createdAt)}</span>
              <span className="case-detail-meta-sep">·</span>
              <span style={{color: hrsWaiting > 48 ? "var(--warn)" : "var(--ink-3)"}}>
                {t.waitingFor}: {hrsWaiting >= 24 ? Math.floor(hrsWaiting/24) + " " + t.daysWaiting : hrsWaiting + " " + t.hoursWaiting}
              </span>
            </div>
          </div>
          <Pill status={c.status} t={t} />
        </div>
        {actionBar}
      </div>

      <div className="card">
        <div className="card-header">{t.patientInfo}</div>
        <DetailRow label={t.email} value={c.patient.email} />
        <DetailRow label={t.birthDate} value={c.patient.birthDate ? `${fmtDate(c.patient.birthDate)} (${calcAge(c.patient.birthDate)} ${t.age})` : "-"} />

            <button onClick={() => setActiveModal(null)}>{t.cancelBtn}</button>

        const totalIn = txns.filter(p => p.type !== "refund").reduce((s, p) => s + p.amount, 0);
        const totalOut = txns.filter(p => p.type === "refund").reduce((s, p) => s + p.amount, 0);

        return (
          <Modal title={t.refundTitle} onClose={() => setActiveModal(null)}>
            <div style={{background:"var(--surface-2)", padding:"12px 14px", borderRadius:"var(--radius)", marginBottom:14, fontSize:12, color:"var(--ink-2)"}}>
              {t.netPaid}: <strong style={{fontFamily:"var(--font-mono)"}}>{refundable.toLocaleString()} ₺</strong>
            </div>
            <Field label={t.refundType} required>
              <select value={refundType} onChange={e => {
                setRefundType(e.target.value);
                if (e.target.value === "full") setRefundAmount(String(refundable));
                else setRefundAmount("");
              }}>
                <option value="partial">{t.refundPartial}</option>
                <option value="full">{t.refundFull}</option>
              </select>
            </Field>
            <Field label={t.refundAmount} required>
              <input type="number" value={refundAmount} onChange={e => setRefundAmount(e.target.value)}
                disabled={refundType === "full"} min="0" max={refundable} style={{fontFamily:"var(--font-mono)"}} />
            </Field>
            <Field label={t.refundReason} required>
              <textarea value={refundReason} onChange={e => setRefundReason(e.target.value)}
                placeholder={t.refundReasonExample} style={{minHeight:80}} />
            </Field>
            <div className="modal-footer">
              <button onClick={() => setActiveModal(null)}>{t.cancelBtn}</button>
              <button className="danger" onClick={doRefund}
                disabled={!refundAmount || !refundReason.trim()}>↩ {t.refundApply}</button>
            </div>
          </Modal>
        );
      })()}

      {activeModal === "extra" && (
        <Modal title={t.extraChargeTitle} onClose={() => setActiveModal(null)}>
          <Field label={t.extraChargeAmount} required>
            <input type="number" value={extraAmount} onChange={e => setExtraAmount(e.target.value)}
              min="0" style={{fontFamily:"var(--font-mono)"}} autoFocus />
          </Field>
          <Field label={t.extraChargeReason} required>
            <textarea value={extraReason} onChange={e => setExtraReason(e.target.value)}
              placeholder={t.extraChargeExample} style={{minHeight:80}} />
          </Field>
          <div className="modal-footer">
            <button onClick={() => setActiveModal(null)}>{t.cancelBtn}</button>
            <button className="warn" onClick={doExtraCharge}
              disabled={!extraAmount || !extraReason.trim()}>+ {t.extraChargeApply}</button>
          </div>
        </Modal>
      )}

      {activeModal === "complete" && (
        <Modal title={t.reportUpload} onClose={() => setActiveModal(null)}>
          <FilePicker t={t} label={t.finalReport} accept=".pdf" required value={reportFile} onChange={setReportFile} />
          <Field label={t.reportSummary} required>
            <textarea value={reportSummary} onChange={e => setReportSummary(e.target.value)} placeholder={t.reportSummaryPlaceholder} style={{minHeight:120}} />
          </Field>
          <div className="modal-footer">
            <button onClick={() => setActiveModal(null)}>{t.cancelBtn}</button>
            <button className="success" onClick={doComplete} disabled={!reportFile || !reportSummary.trim()}>✓ {t.markComplete}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function SettingsModal({ t, settings, onSave, onClose }) {
  const [draft, setDraft] = useState(settings);
  const updatePromo = (idx, field, val) => {
    setDraft(d => ({ ...d, promos: d.promos.map((p, i) => i === idx ? { ...p, [field]: val } : p) }));
  };
  const addPromo = () => {
    setDraft(d => ({ ...d, promos: [...d.promos, { code: "", discount: 0, active: true }] }));
  };
  const removePromo = (idx) => {
    setDraft(d => ({ ...d, promos: d.promos.filter((_, i) => i !== idx) }));
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:640}}>
        <div className="modal-header">
          <div>
            <div className="modal-title">{t.settingsTitle}</div>
            <div style={{fontSize:12, color:"var(--ink-3)", marginTop:2}}>{t.settingsSubtitle}</div>
          </div>
          <button className="ghost icon-btn" onClick={onClose}>✕</button>
        </div>

        <div style={{fontSize:11, color:"var(--ink-3)", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:10, fontWeight:600}}>{t.pricingSection}</div>
        <div className="field-grid-2">
          <Field label={t.standardFee} required>
            <input type="number" value={draft.standardFee} onChange={e => setDraft({ ...draft, standardFee: parseFloat(e.target.value) || 0 })} style={{fontFamily:"var(--font-mono)"}} />
          </Field>
          <Field label={t.vatRate} required>
            <input type="number" value={draft.vatRate} onChange={e => setDraft({ ...draft, vatRate: parseFloat(e.target.value) || 0 })} style={{fontFamily:"var(--font-mono)"}} />
          </Field>
          <Field label={t.trioFee}>
            <input type="number" value={draft.trioFee} onChange={e => setDraft({ ...draft, trioFee: parseFloat(e.target.value) || 0 })} style={{fontFamily:"var(--font-mono)"}} />
          </Field>
          <Field label={t.urgentFee}>
            <input type="number" value={draft.urgentFee} onChange={e => setDraft({ ...draft, urgentFee: parseFloat(e.target.value) || 0 })} style={{fontFamily:"var(--font-mono)"}} />
          </Field>
        </div>

        <hr />

        <div style={{fontSize:11, color:"var(--ink-3)", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:10, fontWeight:600}}>{t.promoSection}</div>
        <div style={{display:"flex", flexDirection:"column", gap:8, marginBottom:12}}>
          {draft.promos.map((p, i) => (
            <div key={i} style={{display:"grid", gridTemplateColumns:"2fr 1fr auto auto", gap:8, alignItems:"center"}}>
              <input value={p.code} onChange={e => updatePromo(i, "code", e.target.value.toUpperCase())}
                style={{fontFamily:"var(--font-mono)"}} placeholder={t.promoCode} />
              <input type="number" value={p.discount} onChange={e => updatePromo(i, "discount", parseFloat(e.target.value) || 0)}
                placeholder="%" style={{fontFamily:"var(--font-mono)"}} />
              <label style={{display:"flex", alignItems:"center", gap:6, fontSize:12, color:"var(--ink-2)"}}>
                <input type="checkbox" checked={p.active} onChange={e => updatePromo(i, "active", e.target.checked)} />
                {t.promoActive}
              </label>
              <button className="ghost icon-btn" onClick={() => removePromo(i)}>✕</button>
            </div>
          ))}
        </div>
        <button onClick={addPromo} style={{fontSize:12}}>+ {t.addPromo}</button>

        <div className="modal-footer" style={{marginTop:20}}>
          <button onClick={onClose}>{t.cancelBtn}</button>
          <button className="primary" onClick={() => { onSave(draft); onClose(); }}>{t.saveSettings}</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [lang, setLang] = useState("tr");
  const [role, setRole] = useState("patient");
  const [view, setView] = useState("landing");
  const [activeCase, setActiveCase] = useState(null);
  const [queueIds, setQueueIds] = useState([]);
  const [queueIdx, setQueueIdx] = useState(0);
  const [cases, setCases] = useState([]);
  const [systemSettings, setSystemSettings] = useState(DEFAULT_SYSTEM_SETTINGS);
  const [showSettings, setShowSettings] = useState(false);
  const [toast, setToast] = useState("");
  const [adminAuthenticated, setAdminAuthenticated] = useState(false);
  const [selectedService, setSelectedService] = useState("wes_reanalysis");

  useEffect(() => {
    const seeded = seedDemoCases();
    const s = loadSettings();
    const sys = loadSystemSettings();

    // URL'den ödeme dönüşü parametrelerini oku
    const urlParams = new URLSearchParams(window.location.search);
    const paidParam = urlParams.get("paid");
    const refParam = urlParams.get("ref");

    let workingCases = seeded;
    let redirectToCase = null;

    if (paidParam === "true" && refParam) {
      // Iyzico'dan başarılı dönüş — eşleşen vakayı paid'e çek
      const targetCase = workingCases.find(c => c.id === refParam);
      if (targetCase && targetCase.status === "payment_pending") {
        const now = new Date().toISOString();
        workingCases = workingCases.map(c => {
          if (c.id !== refParam) return c;
          return {
            ...c,
            status: "paid",
            payments: [...(c.payments || []), {
              id: newEventId(), type: "initial",
              amount: c.payment?.amount || 0,
              reason: "İlk ödeme (Iyzico)",
              timestamp: now
            }],
            events: [...(c.events || []), {
              id: newEventId(), type: "paid",
              actorName: "System", timestamp: now,
              detail: { amount: c.payment?.amount || 0 }
            }]
          };
        });
        saveCases(workingCases);
        redirectToCase = refParam;
      }
      // URL'i temizle
      window.history.replaceState({}, "", window.location.pathname);
    }

    setCases(workingCases);
    setSystemSettings(sys);
    setLang(s.lang || "tr");
    const initialRole = s.role || "patient";
    setRole(initialRole);
    const adminSession = (() => {
      try { return localStorage.getItem(ADMIN_SESSION_KEY); } catch { return null; }
    })();
    const isAuthed = adminSession === "active";
    setAdminAuthenticated(isAuthed);
    if (initialRole === "admin" && !isAuthed) {
      setRole("patient");
      setView("landing");
    } else if (redirectToCase) {
      // Ödeme tamamlandı → vakanın detayına yönlendir
      setActiveCase(redirectToCase);
      setView("detail");
    } else {
      setView(initialRole === "admin" ? "list" : "landing");
    }
  }, []);

  useEffect(() => { saveSettings({ lang, role }); }, [lang, role]);
  useEffect(() => {
    setView(role === "admin" ? "list" : "landing");
    setActiveCase(null);
  }, [role]);

  const t = STRINGS[lang];

  const handleNewCase = useCallback((newCase) => {
    if (newCase) {
      setCases(prev => {
        const updated = [newCase, ...prev];
        saveCases(updated);
        return updated;
      });
    }
  }, []);

  const handleUpdate = useCallback((updated) => {
    setCases(prev => {
      const next = prev.map(c => c.id === updated.id ? updated : c);
      saveCases(next);
      return next;
    });
    setActiveCase(updated.id);
  }, []);

  const handleNavigate = (delta) => {
    const newIdx = queueIdx + delta;
    if (newIdx >= 0 && newIdx < queueIds.length) {
      setQueueIdx(newIdx);
      setActiveCase(queueIds[newIdx]);
    }
  };

  const currentCase = activeCase ? cases.find(c => c.id === activeCase) : null;

  return (
    <div>
      <TopBar t={t} lang={lang} setLang={setLang} role={role} setRole={setRole}
        onSettings={() => setShowSettings(true)}
        adminAuthenticated={adminAuthenticated}
        onAdminLogout={() => {
          setAdminAuthenticated(false);
          try { localStorage.removeItem(ADMIN_SESSION_KEY); } catch {}
          setRole("patient");
          setView("landing");
        }} />
      {toast && (
        <div style={{position:"fixed", top:80, right:32, zIndex:200,
          background:"var(--success)", color:"white", padding:"10px 16px",
          borderRadius:"var(--radius)", fontSize:13, fontWeight:500,
          boxShadow:"0 4px 12px rgba(0,0,0,0.15)"}}>
          ✓ {toast}
        </div>
      )}
      {role === "patient" && view === "landing" && (
        <LandingPage t={t} systemSettings={systemSettings}
          onPickService={(type) => { setSelectedService(type); setView("wizard"); }}
          onTrack={() => setView("track")} />
      )}
      {role === "patient" && view === "track" && (
        <TrackCase t={t} cases={cases}
          onFound={(id) => { setActiveCase(id); setView("detail"); }}
          onBack={() => setView("landing")} />
      )}
      {role === "patient" && view === "wizard" && (
        <Wizard t={t} systemSettings={systemSettings} serviceType={selectedService}
          onComplete={(action, payload) => {
            if (action === "submit" && payload) {
              handleNewCase(payload);
            } else if (action === "view" && payload) {
              setActiveCase(payload);
              setView("detail");
            } else if (action === "paid" && payload) {
              // Hasta Iyzico'da ödediğini bildirdi → vakayı paid'e çek
              setCases(prev => {
                const next = prev.map(c => {
                  if (c.id !== payload) return c;
                  const now = new Date().toISOString();
                  return {
                    ...c,
                    status: "paid",
                    payments: [...(c.payments || []), {
                      id: newEventId(), type: "initial",
                      amount: c.payment?.amount || 0,
                      reason: t.paymentTypeInitial,
                      timestamp: now
                    }],
                    events: [...(c.events || []), {
                      id: newEventId(), type: "paid",
                      actorName: "System", timestamp: now,
                      detail: { amount: c.payment?.amount || 0 }
                    }]
                  };
                });
                saveCases(next);
                return next;
              });
              setActiveCase(payload);
              setView("detail");
            } else {
              setView("landing");
            }
          }}
          onCancel={() => setView("landing")} />
      )}
      {role === "patient" && view === "detail" && currentCase && (
        <PatientCaseDetail caseData={currentCase} t={t}
          onBack={() => { setView("landing"); setActiveCase(null); }} />
      )}
      {role === "admin" && !adminAuthenticated && (
        <AdminLogin t={t}
          onSuccess={() => {
            setAdminAuthenticated(true);
            try { localStorage.setItem(ADMIN_SESSION_KEY, "active"); } catch {}
          }}
          onCancel={() => {
            setRole("patient");
            setView("landing");
          }} />
      )}
      {role === "admin" && adminAuthenticated && view === "list" && (
        <AdminQueue cases={cases} t={t} onView={(id, ids, idx) => { setActiveCase(id); setQueueIds(ids); setQueueIdx(idx); setView("detail"); }} />
      )}
      {role === "admin" && adminAuthenticated && view === "detail" && currentCase && (
        <AdminCaseDetail caseData={currentCase} t={t} onBack={() => { setView("list"); setActiveCase(null); }}
          onUpdate={handleUpdate} queueIds={queueIds} queueIdx={queueIdx} onNavigate={handleNavigate} />
      )}
      {showSettings && (
        <SettingsModal t={t} settings={systemSettings}
          onSave={(s) => {
            setSystemSettings(s);
            saveSystemSettings(s);
            setToast(t.settingsSaved);
            setTimeout(() => setToast(""), 2500);
          }}
          onClose={() => setShowSettings(false)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
